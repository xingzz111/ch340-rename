name: Release CLI Tool

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./FTProg
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        working-directory: ./FTProg
        run: |
          pyinstaller --onefile --name kimi-ch340 src/kimi_ch340/cli.py

      - name: Rename artifact
        run: |
          mv FTProg/dist/kimi-ch340 FTProg/dist/kimi-ch340-macos-universal
          chmod +x FTProg/dist/kimi-ch340-macos-universal

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: FTProg/dist/kimi-ch340-macos-universal
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
