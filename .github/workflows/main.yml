name: Release CLI Tool

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: kimi-ch340
            asset_name: kimi-ch340-linux-x86_64
          - os: macos-latest
            artifact_name: kimi-ch340
            asset_name: kimi-ch340-macos-universal
          - os: windows-latest
            artifact_name: kimi-ch340.exe
            asset_name: kimi-ch340-windows-x86_64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./FTProg
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        working-directory: ./FTProg
        run: |
          pyinstaller --onefile --name kimi-ch340 src/kimi_ch340/cli.py

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: FTProg/dist/${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
