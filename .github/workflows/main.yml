name: Release CLI Tool

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: kimi-ch340-linux-x86_64
            build_name: kimi-ch340
          - os: macos-latest
            artifact_name: kimi-ch340-macos-universal
            build_name: kimi-ch340
          - os: windows-latest
            artifact_name: kimi-ch340-windows-x86_64.exe
            build_name: kimi-ch340

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./FTProg
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        working-directory: ./FTProg
        run: |
          pyinstaller --onefile --name ${{ matrix.build_name }} src/kimi_ch340/cli.py

      - name: Rename artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mv FTProg/dist/${{ matrix.build_name }} FTProg/dist/${{ matrix.artifact_name }}
          chmod +x FTProg/dist/${{ matrix.artifact_name }}

      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Move-Item FTProg/dist/${{ matrix.build_name }}.exe FTProg/dist/${{ matrix.artifact_name }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: FTProg/dist/${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
